<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZXWebRadio</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <style>
        /* Μηδενισμός περιθωρίων για πλήρη κάλυψη της οθόνης */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Εξαφανίζει τα scrollbars */
            background-color: #121212; /* Το χρώμα του background σου */
        }

        /* Το Iframe που θα "φιλοξενήσει" το Google Script */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbzfcswT_DGsxNhw3KenOplgpj7j_-G5wjaA4yzbozjSePP17iLGunXx8ZwgWk7N0EeNxA/exec" 
        allow="autoplay; encrypted-media" 
        title="My Web Radio Content">
    </iframe>

</body>
</html>
